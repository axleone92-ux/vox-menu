name: Build Geode Mod

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Mod
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Geode SDK
      uses: geode-sdk/setup-geode@main

    - name: Build Geode Mod
      uses: geode-sdk/build-geode-mod@main
